name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:

  # ── Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Check linting
        run: uv run ruff check .


  # ── Unit tests ───────────────────────────────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v


  # ── Integration tests ────────────────────────────────────────────────────
  test-integration:
    name: Integration Tests (API)
    runs-on: ubuntu-latest

    # API tests mock all service calls — no real DB needed
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run integration tests
        env:
          DATABASE_URL:    postgresql://dummy:dummy@localhost:5432/dummy
          READONLY_DB_URL: postgresql://dummy:dummy@localhost:5432/dummy
        run: uv run pytest tests/integration/ -v


  # ── Docker build ─────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    # Only run on push to master, not on every PR to save minutes
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build skillhub image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: skillhub
          push: false
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build etl image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: etl
          push: false
          cache-from: type=gha
          cache-to:   type=gha,mode=max
